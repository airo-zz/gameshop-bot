version: "3.9"

# ─────────────────────────────────────────────
#  reDonate Bot — Docker Compose (Development)
#  Использование: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ─────────────────────────────────────────────

services:

  api:
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    volumes:
      - .:/app   # hot reload — монтируем исходники
    environment:
      DEBUG: "true"
      LOG_LEVEL: "DEBUG"
      ENVIRONMENT: "development"

  bot:
    command: python -m bot.main
    volumes:
      - .:/app
    environment:
      DEBUG: "true"
      LOG_LEVEL: "DEBUG"

  worker:
    volumes:
      - .:/app
    environment:
      DEBUG: "true"

  beat:
    volumes:
      - .:/app

  # В dev — отключаем nginx, работаем напрямую с портами
  nginx:
    profiles: ["prod"]   # не запускается в dev

  certbot:
    profiles: ["prod"]
