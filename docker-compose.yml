# ─────────────────────────────────────────────
#  reDonate Bot — Docker Compose (Production)
# ─────────────────────────────────────────────

x-common-env: &common-env
  env_file: .env
  restart: unless-stopped
  networks:
    - redonate-net

x-healthcheck-postgres: &hc-postgres
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
    interval: 10s
    timeout: 5s
    retries: 5

x-healthcheck-redis: &hc-redis
  healthcheck:
    test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    interval: 10s
    timeout: 5s
    retries: 5

services:

  # ── PostgreSQL ──────────────────────────────
  db:
    image: postgres:16-alpine
    <<: [*common-env, *hc-postgres]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # ports:
    #   - "5432:5432"   # не открывать наружу в production

  # ── Redis ───────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: [*common-env, *hc-redis]
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data

  # ── Migrations (run once) ───────────────────
  migrations:
    build:
      context: .
      dockerfile: Dockerfile.api
    <<: *common-env
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── FastAPI Backend ─────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    <<: *common-env
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2 --log-level info
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - media_data:/app/media
      - static_files:/static

  # ── Telegram Bot ────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    <<: *common-env
    command: python -m bot.main
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - static_files:/static

  # ── Celery Worker ───────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    <<: *common-env
    command: celery -A worker.main worker --loglevel=info --concurrency=4 -Q default,notifications,abandoned_carts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (планировщик) ───────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile.api
    <<: *common-env
    command: celery -A worker.main beat --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Flower (мониторинг задач) ────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile.api
    <<: *common-env
    command: celery -A worker.main flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-secret}
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # ── Nginx (reverse proxy + Mini App) ────────
  nginx:
    image: nginx:alpine
    <<: *common-env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./miniapp/dist:/usr/share/nginx/html/app:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - static_files:/usr/share/nginx/static:ro
    depends_on:
      api:
        condition: service_healthy
      bot:
        condition: service_healthy

  # ── Certbot (SSL) ────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  redonate-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_files:
  certbot_data:
  certbot_www:
