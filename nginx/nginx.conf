worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # auth_zone: жёсткий лимит для эндпоинтов авторизации (брутфорс-защита)
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
    # api_zone: общий лимит для всего API (DoS-защита)
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/s;
    # Возвращаем 429 вместо дефолтного 503
    limit_req_status 429;
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/x-javascript text/xml
               application/xml application/xml+rss image/svg+xml
               application/wasm;

    include /etc/nginx/conf.d/*.conf;
}
