server {
    listen 80;
    server_name redonate.su;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name redonate.su;

    ssl_certificate     /etc/letsencrypt/live/redonate.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/redonate.su/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Mini App (React SPA) ──────────────────────────────────────────────────
    location /app {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/index.html @spa_fallback;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";

        location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    location @spa_fallback {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files /app/index.html =404;
    }

    # ── FastAPI Backend ───────────────────────────────────────────────────────
    location /api {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ── Bot Webhook ───────────────────────────────────────────────────────────
    location /webhook {
        proxy_pass         http://bot:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://api:8000;
    }

    location ~ /\. { deny all; }
}
