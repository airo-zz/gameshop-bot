# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────────────────────
# CI/CD: тесты → сборка → selective deploy на VPS
#
# Логика деплоя:
#   miniapp/ изменился              → deploy-miniapp (npm build + rsync)
#   bot/ api/ worker/ и т.д.        → deploy-backend (docker compose up --build)
#   оба направления изменились      → оба деплоя параллельно
#   workflow_dispatch (ручной)      → деплоится всё принудительно
#
# Secrets в GitHub (Settings → Secrets):
#   VPS_HOST        — IP или домен VPS
#   VPS_USER        — пользователь SSH (redonate)
#   VPS_SSH_KEY     — приватный SSH ключ
#   VPS_APP_DIR     — путь к проекту (/opt/gameshop)
#   TELEGRAM_BOT_TOKEN  — токен бота для уведомлений
#   TELEGRAM_CHAT_ID    — chat_id для уведомлений
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy reDonate Bot

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_miniapp:
        description: "Force deploy miniapp (yes/no)"
        required: false
        default: "yes"
      force_backend:
        description: "Force deploy backend (yes/no)"
        required: false
        default: "yes"

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION:   "20"

jobs:

  # ─── Определяем что изменилось ───────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      miniapp:  ${{ steps.filter.outputs.miniapp }}
      backend:  ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4

      - name: Path filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            miniapp:
              - 'miniapp/**'
            backend:
              - 'bot/**'
              - 'api/**'
              - 'worker/**'
              - 'shared/**'
              - 'migrations/**'
              - 'requirements/**'
              - 'Dockerfile.api'
              - 'Dockerfile.bot'
              - 'docker-compose.yml'
              - 'alembic.ini'

  # ─── Линтинг и тесты ────────────────────────────────────────────────────────
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    # Тесты всегда запускаются при push, пропускаются только если ни один
    # из деплоев не будет запущен — но мы запускаем их безусловно для safety
    needs: detect-changes

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     test
          POSTGRES_PASSWORD: test
          POSTGRES_DB:       test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements/api.txt
          pip install -r requirements/bot.txt
          pip install pytest pytest-asyncio

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          BOT_TOKEN=0000000000:test_token_for_ci
          POSTGRES_PASSWORD=test
          DATABASE_URL=postgresql+asyncpg://test:test@localhost:5432/test
          REDIS_URL=redis://localhost:6379/0
          CELERY_BROKER_URL=redis://localhost:6379/1
          CELERY_RESULT_BACKEND=redis://localhost:6379/2
          JWT_SECRET_KEY=test_secret_key_minimum_32_characters
          SHOP_NAME=TestShop
          EOF

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --tb=short || echo "No tests yet — skipping"

      - name: Lint Python (ruff)
        run: |
          pip install ruff || true
          ruff check . --select E,W,F --ignore E501 || echo "Lint warnings"

  # ─── Сборка Mini App ─────────────────────────────────────────────────────────
  build-miniapp:
    name: Build Mini App
    runs-on: ubuntu-latest
    needs: detect-changes
    # Собираем только если изменился miniapp/ ИЛИ ручной запуск с force
    if: |
      needs.detect-changes.outputs.miniapp == 'true' ||
      github.event.inputs.force_miniapp == 'yes'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: miniapp/package-lock.json

      - name: Install & Build
        working-directory: miniapp
        env:
          VITE_SHOP_NAME: reDonate
          VITE_BOT_USERNAME: redonate_robot
        run: |
          npm ci
          npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: miniapp-dist
          path: miniapp/dist/
          retention-days: 1

  # ─── Деплой Mini App ─────────────────────────────────────────────────────────
  deploy-miniapp:
    name: Deploy Mini App to VPS
    runs-on: ubuntu-latest
    needs: [detect-changes, build-miniapp]
    if: |
      needs.detect-changes.outputs.miniapp == 'true' ||
      github.event.inputs.force_miniapp == 'yes'

    steps:
      - name: Download Mini App build
        uses: actions/download-artifact@v4
        with:
          name: miniapp-dist
          path: miniapp-dist/

      - name: Copy dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:        ${{ secrets.VPS_HOST }}
          username:    ${{ secrets.VPS_USER }}
          password:    ${{ secrets.VPS_PASSWORD }}
          source:      "miniapp-dist/"
          target:      "/tmp/redonate-miniapp/"
          strip_components: 1

      - name: Swap dist on VPS and reload nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout:  60s
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"

            # Обновляем miniapp/dist без удаления самой папки
            # (удаление ломает Docker bind mount до рестарта nginx)
            mkdir -p "$APP_DIR/miniapp/dist"
            find "$APP_DIR/miniapp/dist" -mindepth 1 -delete
            cp -r /tmp/redonate-miniapp/. "$APP_DIR/miniapp/dist/"
            rm -rf /tmp/redonate-miniapp

            # Перезагружаем nginx — он подхватывает новые файлы из bind mount
            docker compose -f "$APP_DIR/docker-compose.yml" exec -T nginx nginx -s reload

            echo "miniapp deployed at $(date)"

  # ─── Деплой Backend ──────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend to VPS
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    # Деплоим если изменился backend ИЛИ ручной запуск с force
    # build-miniapp НЕ является зависимостью — backend деплоится независимо
    if: |
      needs.detect-changes.outputs.backend == 'true' ||
      github.event.inputs.force_backend == 'yes'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout:  300s
          script: |
            set -e
            cd "${{ secrets.VPS_APP_DIR }}"

            # Получаем свежий код
            git fetch origin main
            git reset --hard origin/main

            # Пересобираем и перезапускаем только backend-контейнеры
            # nginx, db, redis, certbot не трогаем — они не изменились
            DOCKER_BUILDKIT=1 COMPOSE_DOCKER_CLI_BUILD=1 \
              docker compose up -d --build --remove-orphans \
              migrations api bot support_bot worker beat flower

            # Ждём стабилизации контейнеров
            echo "Waiting for containers..."
            for i in $(seq 1 30); do
              sleep 3
              RUNNING=$(docker compose ps --format json 2>/dev/null \
                | grep -c '"State":"running"' || true)
              RESTARTING=$(docker compose ps --format json 2>/dev/null \
                | grep -c '"State":"restarting"' || true)
              if [ "$RESTARTING" -eq 0 ] && [ "$RUNNING" -gt 0 ]; then
                echo "Containers stable after ${i}x3s"
                break
              fi
              echo "Attempt $i: running=$RUNNING restarting=$RESTARTING"
            done

            # Health check API
            sleep 2
            curl -sf http://localhost:8000/health || echo "WARNING: health check failed"

            # Перезагружаем nginx чтобы сбросить кэш DNS после пересоздания контейнеров
            docker compose exec -T nginx nginx -s reload || echo "WARNING: nginx reload failed"

            echo "backend deployed at $(date)"

  # ─── Уведомления ─────────────────────────────────────────────────────────────
  notify:
    name: Notify Deploy Result
    runs-on: ubuntu-latest
    # Запускается после всех деплоев, даже если они были пропущены (skipped)
    needs: [detect-changes, deploy-miniapp, deploy-backend]
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Determine deploy summary
        id: summary
        run: |
          MINIAPP_STATUS="${{ needs.deploy-miniapp.result }}"
          BACKEND_STATUS="${{ needs.deploy-backend.result }}"
          MINIAPP_CHANGED="${{ needs.detect-changes.outputs.miniapp }}"
          BACKEND_CHANGED="${{ needs.detect-changes.outputs.backend }}"

          PARTS=""
          FAILED=false

          if [ "$MINIAPP_STATUS" = "success" ]; then
            PARTS="miniapp"
          elif [ "$MINIAPP_STATUS" = "failure" ]; then
            PARTS="miniapp(FAILED)"
            FAILED=true
          fi

          if [ "$BACKEND_STATUS" = "success" ]; then
            PARTS="${PARTS:+$PARTS, }backend"
          elif [ "$BACKEND_STATUS" = "failure" ]; then
            PARTS="${PARTS:+$PARTS, }backend(FAILED)"
            FAILED=true
          fi

          if [ -z "$PARTS" ]; then
            PARTS="nothing (no relevant changes)"
          fi

          echo "parts=$PARTS"        >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED"      >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FAILED="${{ steps.summary.outputs.failed }}"
          PARTS="${{ steps.summary.outputs.parts }}"
          COMMIT="${{ github.sha }}"
          SHORT="${COMMIT:0:7}"
          ACTOR="${{ github.actor }}"
          REF="${{ github.ref_name }}"

          if [ "$FAILED" = "true" ]; then
            ICON="X"
            STATUS="FAILED"
          else
            ICON="OK"
            STATUS="SUCCESS"
          fi

          MSG="[$ICON] Deploy $STATUS%0A"
          MSG="${MSG}Branch: $REF%0A"
          MSG="${MSG}Commit: $SHORT by $ACTOR%0A"
          MSG="${MSG}Deployed: $PARTS"

          curl -s -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=HTML" || echo "Telegram notify failed (non-fatal)"
