# .github/workflows/update-shop-name.yml
# Одноразовый workflow: обновить SHOP_NAME в .env на VPS.
# После успешного выполнения — удалить этот файл.

name: Update SHOP_NAME on VPS

on:
  workflow_dispatch:    # только ручной запуск из GitHub UI

jobs:
  update-env:
    name: Update SHOP_NAME in .env
    runs-on: ubuntu-latest

    steps:
      - name: Update SHOP_NAME and restart bot+api
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout:  60s
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_DIR }}"

            echo "=== [1] Ищем .env файл ==="
            ENV_FILE="$APP_DIR/.env"
            if [ ! -f "$ENV_FILE" ]; then
              echo "ERROR: $ENV_FILE не найден"
              find /opt -name ".env" 2>/dev/null
              exit 1
            fi
            echo "Найден: $ENV_FILE"

            echo "=== [2] Текущее значение SHOP_NAME ==="
            grep "SHOP_NAME" "$ENV_FILE" || echo "(строка SHOP_NAME не найдена)"

            echo "=== [3] Применяем замену ==="
            # Заменяем любое значение SHOP_NAME на reDonate
            # Поддерживает форматы: SHOP_NAME=value, SHOP_NAME="value", SHOP_NAME='value'
            sed -i 's/^SHOP_NAME=.*/SHOP_NAME="reDonate"/' "$ENV_FILE"

            # Если строки SHOP_NAME не было — добавляем
            grep -q "^SHOP_NAME=" "$ENV_FILE" || echo 'SHOP_NAME="reDonate"' >> "$ENV_FILE"

            echo "=== [4] Новое значение ==="
            grep "SHOP_NAME" "$ENV_FILE"

            echo "=== [5] Перезапускаем bot и api ==="
            cd "$APP_DIR"
            docker compose restart bot api

            echo "=== [6] Ждём 5 секунд ==="
            sleep 5

            echo "=== [7] Проверяем переменную внутри контейнеров ==="
            echo "--- bot ---"
            docker compose exec -T bot env | grep SHOP_NAME || echo "WARNING: SHOP_NAME не найден в bot"
            echo "--- api ---"
            docker compose exec -T api env | grep SHOP_NAME || echo "WARNING: SHOP_NAME не найден в api"

            echo "=== [8] Статус контейнеров ==="
            docker compose ps bot api

            echo "Done. SHOP_NAME обновлён на reDonate."
